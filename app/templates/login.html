{% extends "base.html" %}
{% block content %}
<div style="max-width:380px;margin:2rem auto">
    <section class="card" data-anim>
        <h2>🔐 Iniciar sesión</h2>
        <p style="color:var(--muted);font-size:.85rem;margin-top:-.4rem">
            Solo los administradores cargan resultados y predicciones. El resto de la
            familia puede ver todo sin iniciar sesión.
        </p>
        {% if error %}
        <p style="background:rgba(255,107,107,.15);border:1px solid var(--rojo);
                  color:#ffd5d5;padding:.6rem;border-radius:9px;font-size:.85rem">⚠️ {{ error }}</p>
        {% endif %}
        <form method="post" action="/login">
            <label for="usuario">Usuario</label>
            <input id="usuario" name="usuario" autocomplete="username" required>
            <label for="clave" style="margin-top:.6rem">Clave</label>
            <input id="clave" name="clave" type="password" autocomplete="current-password" required>
            <button class="btn" type="submit" style="width:100%;margin-top:1rem">Entrar</button>
        </form>
        <p style="text-align:center;margin-top:1rem">
            <a href="/" style="color:var(--muted);font-size:.82rem">← Volver a ver la quiniela</a>
        </p>
    </section>
</div>
{% endblock %}
